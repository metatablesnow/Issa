name = "metatablesnow/issa"
version = "0.2.0"
description = "A runtime type validator with pretty errors and real types"
authors = ["metatablesnow"]
repository = "https://github.com/metatablesnow/Issa/tree/main"
license = "MIT"
includes = ["pesde.toml", "LICENSE", "README.md", "src/**"]

[target]
environment = "roblox"
lib = "src/init.luau"
build_files = ["src"]

[indices]
default = "https://github.com/pesde-pkg/index"

[scripts]
roblox_sync_config_generator = ".pesde/scripts/roblox_sync_config_generator.luau"
sourcemap_generator = ".pesde/scripts/sourcemap_generator.luau"

[dev_dependencies]
scripts = { name = "pesde/scripts_rojo", version = "^0.2.0", target = "lune" }
rojo = { name = "pesde/rojo", version = "^7.5.1", target = "lune" }

[engines]
pesde = "^0.7.0"
lune = "^0.10.2"
